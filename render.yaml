services:
  - type: web
    name: lamyskaura
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_KEY
        generateValue: true
      - key: ENV
        value: production
      - key: DATA_DIR
        value: /data
    disk:
      name: lamyskaura-data
      mountPath: /data
      sizeGB: 1
