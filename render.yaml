services:
  - type: web
    name: lamyskaura
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_KEY
        generateValue: true
      - key: ENV
        value: production
    # Uncomment the block below only if you upgrade to a Render paid plan ($7/month).
    # Without the disk the DB resets on each deploy — fine for testing, not for production.
    # disk:
    #   name: lamyskaura-data
    #   mountPath: /data
    #   sizeGB: 1
    # - key: DATA_DIR
    #   value: /data
