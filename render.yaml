services:
  - type: web
    name: lamyskaura
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.3
    disk:
      name: lamyskaura-data
      mountPath: /data
      sizeGB: 1
